name: Deploy VitePress to Aliyun OSS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: oss
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖 & 打包 VitePress
        run: |
          npm install
          npm run docs:build

      # 修复DNS解析问题 + 安装并配置ossutil
      - name: 安装 ossutil 并配置（修复DNS）
        run: |
          # 1. 配置公共DNS，解决GitHub Actions解析阿里云域名失败问题
          echo "nameserver 223.5.5.5" | sudo tee /etc/resolv.conf > /dev/null
          echo "nameserver 8.8.8.8" | sudo tee -a /etc/resolv.conf > /dev/null
          
          # 2. 下载ossutil并赋予执行权限
          wget https://gosspublic.alicdn.com/ossutil/1.7.16/ossutil64
          chmod +x ossutil64
          
          # 3. 配置ossutil，强制使用HTTPS协议，避免解析问题
          ./ossutil64 config \
            -i "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" \
            -k "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}" \
            -e "https://${{ secrets.ALIYUN_OSS_REGION }}.aliyuncs.com" \
            -L CH
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}

      # 同步文件到阿里云 OSS
      - name: 同步文件到阿里云 OSS
        run: |
          # 验证打包产物目录是否存在
          if [ ! -d "./.townwang/.vitepress/dist" ]; then
            echo "❌ 错误：打包产物目录不存在，请检查 docs:build 命令"
            exit 1
          fi
          
          # 执行同步，--delete 删除远端多余文件，--force 跳过确认
          ./ossutil64 sync "./.townwang/.vitepress/dist/" "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/" \
            --delete --force
