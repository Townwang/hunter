name: Deploy VitePress to Aliyun ECS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # 关键：指定使用 ecs 环境，加载 Secrets
    environment: ecs
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖 & 打包 VitePress
        run: |
          npm install
          npm run docs:build

      - name: 上传打包产物到 ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          source: ".townwang/.vitepress/dist/*"
          target: ${{ secrets.ECS_WEB_DIR }}
          rm: true # 上传前清空目标目录
          debug: true # 开启调试日志

      - name: 部署后权限修复（可选）
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.ECS_WEB_DIR }}
            chmod -R 755 .
            echo "✅ 部署完成！"
