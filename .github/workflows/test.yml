name: 测试 SSH 连接

on:
  push:
    branches: [ main ]

jobs:
  test-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: 测试 SSH 连接
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 47.99.37.171
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          script: |
            echo "✅ SSH 连接成功！当前目录: $(pwd)"
