name: Deploy VitePress to Aliyun ECS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖 & 打包 VitePress
        run: |
          npm install
          npm run docs:build

      - name: 通过 SCP 上传打包产物到 ECS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          # 关键：适配你的 .townwang 目录打包路径
          source: ".townwang/.vitepress/dist/*"
          target: ${{ secrets.ECS_WEB_DIR }}

      - name: ECS 部署后清理&权限（可选）
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.ECS_WEB_DIR }}
            chmod -R 755 .
