name: Deploy VitePress to ECS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 安装依赖 & 打包
        run: |
          npm install
          npm run docs:build

      - name: 上传 dist 到阿里云 ECS
        uses: easingthemes/ssh-deploy@v4
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
        with:
          REMOTE_HOST: ${{ secrets.ECS_HOST }}
          REMOTE_USER: ${{ secrets.ECS_USER }}
          REMOTE_PORT: 22
          # 本地打包产物目录
          SOURCE: "docs/.vitepress/dist/"
          # ECS 目标目录
          REMOTE_TARGET: "/home/vitepress/dist"
          # 递归上传 + 删除远端多余文件
          ARGS: "-avz --delete"
          # 跳过 known_hosts 询问
          SSH_CMD_ARGS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
