name: Deploy VitePress to Aliyun ECS

# 触发时机：推送到 main 分支就自动部署
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖 & 打包 VitePress
        run: |
          npm install
          npm run build

      - name: 通过 SSH 部署到阿里云 ECS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.ECS_WEB_DIR }}
            # 清空旧文件
            rm -rf *
            # 把本地打包好的 dist 传到 ECS 站点目录
      - name: 上传打包产物到 ECS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          source: "docs/.vitepress/dist/*"
          target: ${{ secrets.ECS_WEB_DIR }}
