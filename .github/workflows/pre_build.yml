name: Deploy VitePress to ECS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 安装依赖 & 打包
        run: |
          npm install
          npm run docs:build

      - name: 上传 dist 到阿里云 ECS
        uses: easingthemes/ssh-deploy@v4
        with:
          # 这里改成 action 要求的驼峰式参数名
          sshPrivateKey: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          remoteHost: ${{ secrets.ECS_HOST }}
          remoteUser: ${{ secrets.ECS_USER }}
          remotePort: 22
          source: "docs/.vitepress/dist/"
          # 这里把 REMOTE_TARGET 改成 TARGET
          target: "/home/vitepress/dist"
          args: "-avz --delete"
          sshCmdArgs: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
